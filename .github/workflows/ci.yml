name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          node -v
          npm i -g pnpm@10.29.2
          pnpm -v

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Migration files check
        run: pnpm db:migration-files-check
